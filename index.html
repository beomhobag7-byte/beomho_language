<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>범호어</title>

    <style>
        .output {
            margin-left: 20px;
            margin-bottom: 10px;
            color: gray;
            font-size: 20px;
        }


        .button {
            position: absolute;
            left: 0;
            top: 2.5px;

        width: 30px;
        height: 30px;

        border-radius: 50%;
        border: none;
        padding: 0;

        background-color: black;
        color: white;

        font-size: 16px;
        cursor: pointer;

        display: flex;
        justify-content: center;
        align-items: center;

        z-index: 10;
        }

        .center {
            text-align: center;
        }

        .dark {
            background-color: black;
            color: white;
        }

        .light {
            background-color: white;
            color: black;
        }

        #console {
            margin-left: 20px;
            font-size: 24px;
        }

        .line {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            width: 100%;
        }

        .prompt {
            font-weight: bold;
            margin-right: 8px;
            white-space: nowrap;
        }

        .commandInput {
            font-size: 24px;
            border: none;
            outline: none;
            background-color: transparent;
            color: inherit;
            flex: 1;
        }
        @keyframes bigText {
            0% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }

            50% {
                opacity: 1;
                transform: translateX(20px) scale(1.8);
            }

            100% {
                opacity: 1;
                transform: translateX(0) scale(1.5);
            }
        }

        @keyframes disappearText {
            0% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateX(80px) scale(0.6);
            }
        }

        .commandInput.disappear {
            animation: disappearText 0.6s ease-in-out forwards;
        }

        .commandInput.bigText {
            animation: bigText 0.6s ease-in-out forwards;
            transform-origin: left center;
            font-weight: bold;
        }

        .multiLineBox {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
            width: 100%;
        }

        .multiTextarea {
            font-size: 20px;
            width: 70%;
            height: 160px;
            background-color: transparent;
            color: inherit;
            outline: none;
            resize: vertical;
            padding: 10px;
        }

        .runButton {
            margin-left: 10px;
            font-size: 18px;
            padding: 8px 14px;
            cursor: pointer;
        }

        .round {
            width: 20px;
            height: 20px;
            padding: 10px;
        }

        .button:hover{
            transform: scale(1.1);
        }

        .backgroundbutton{
            width: 60px;
            height: 35px;
            background-color: gray;
            border-radius: 100%;
        }

        @keyframes softleft {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(30px);
            }
            
        }

        @keyframes softright {
            0% {
                transform: translateX(30px);
            }
            100% {
                transform: translateX(0);
            }
            
        }

        .button.right { 
            animation: softleft 0.2s ease-in-out forwards
        }

        .button.left {
            animation: softright 0.2s ease-in-out forwards
        }
        .wrap {
            position: absolute;
            right: 100px;
            top: 50px;
            width: 60px;
            height: 35px;
        }

        .parent1 {
            background-color: gray;

            left: 0;
            top: 0;

            width: 30px;
            height: 35px;

        let 변수들 = {};

        // & 명령어를 썼을 때, 변수 이름을 잠깐 기억해 두는 공간입니다.
        let 임시변수이름 = null;

                element.className = isDark ? "light" : "dark";

        function baanbok(a, b) {
            while (a != 0) {
                executeCommand(b, true);
                a--;
            }
        }
        function 한글숫자바꾸기(글자) {
            const 숫자표 = {
                "영": 0,
                "일": 1,
                "이": 2,
                "삼": 3,
                "사": 4,
                "오": 5,
                "육": 6,
                "칠": 7,
                "팔": 8,
                "구": 9
            };

            if (글자 in 숫자표) {
                return 숫자표[글자];
            }

            if (글자 === "십") {
                return 10;
            }

            if (글자 === "백") {
                return 100;
            }

            if (글자.includes("십")) {
                let 나눈것 = 글자.split("십");

                let 앞 = 나눈것[0];
                let 뒤 = 나눈것[1];

                let 십의자리 = 앞 === "" ? 1 : 숫자표[앞];
                let 일의자리 = 뒤 === "" ? 0 : 숫자표[뒤];

                return 십의자리 * 10 + 일의자리;
            }

            throw new Error("숫자 오류");
        }

        function calc(input) {
            let cleanInput = input.replace(/\s/g, "");

            // 계산식에서 쓸 수 있는 연산자입니다.
            let 연산자목록 = ["더하기", "빼기", "곱하기", "나누기"];

            // 한글 숫자 토큰을 자동으로 만듭니다.
            // 예: 구십구, 구십팔, ..., 십일, 십, 영, 일, 이 ...
            function 한글숫자토큰만들기() {
                let 숫자글자 = ["영", "일", "이", "삼", "사", "오", "육", "칠", "팔", "구"];
                let tokens = ["백"];

                for (let 십의자리 = 9; 십의자리 >= 1; 십의자리--) {
                    for (let 일의자리 = 9; 일의자리 >= 0; 일의자리--) {
                        let token = "";

                        if (십의자리 === 1) {
                            token = "십";
                        } else {
                            token = 숫자글자[십의자리] + "십";
                        }

                        if (일의자리 !== 0) {
                            token += 숫자글자[일의자리];
                        }

                        tokens.push(token);
                    }
                }

                for (let i = 0; i < 숫자글자.length; i++) {
                    tokens.push(숫자글자[i]);
                }

                // 긴 숫자를 먼저 확인해야 합니다.
                // 예: "십칠"을 "십" + "칠"로 잘못 나누면 안 됩니다.
                tokens.sort(function(a, b) {
                    return b.length - a.length;
                });

                return tokens;
            }

            function 토큰만들기() {
                let tokens = [];
                let pos = 0;
                let 한글숫자토큰 = 한글숫자토큰만들기();

                // 변수 이름도 긴 것부터 먼저 확인합니다.
                // 예: "박범호점수"와 "박범호"가 둘 다 있으면 긴 이름을 먼저 잡아야 합니다.
                let 변수이름목록 = Object.keys(변수들).sort(function(a, b) {
                    return b.length - a.length;
                });

                while (pos < cleanInput.length) {
                    let matched = false;

                    // 괄호 처리
                    if (cleanInput[pos] === "(" || cleanInput[pos] === ")") {
                        tokens.push({ type: "paren", value: cleanInput[pos] });
                        pos++;
                        continue;
                    }

                    // 연산자 처리
                    for (let i = 0; i < 연산자목록.length; i++) {
                        let op = 연산자목록[i];

                        if (cleanInput.startsWith(op, pos)) {
                            tokens.push({ type: "op", value: op });
                            pos += op.length;
                            matched = true;
                            break;
                        }
                    }

                    if (matched) continue;

                    // 17, 95 같은 일반 숫자 처리
                    let 숫자매치 = cleanInput.slice(pos).match(/^\d+(\.\d+)?/);

                    if (숫자매치) {
                        tokens.push({ type: "number", value: Number(숫자매치[0]) });
                        pos += 숫자매치[0].length;
                        continue;
                    }

                    // 변수 이름 처리
                    for (let i = 0; i < 변수이름목록.length; i++) {
                        let name = 변수이름목록[i];

                        if (name !== "" && cleanInput.startsWith(name, pos)) {
                            let value = 변수들[name];

                            if (isNaN(Number(value))) {
                                throw new Error("숫자가 아닌 변수는 계산할 수 없음");
                            }

                            tokens.push({ type: "number", value: Number(value) });
                            pos += name.length;
                            matched = true;
                            break;
                        }
                    }

                    if (matched) continue;

                    // 일, 십칠, 구십오 같은 한글 숫자 처리
                    for (let i = 0; i < 한글숫자토큰.length; i++) {
                        let numText = 한글숫자토큰[i];

                        if (cleanInput.startsWith(numText, pos)) {
                            tokens.push({ type: "number", value: 한글숫자바꾸기(numText) });
                            pos += numText.length;
                            matched = true;
                            break;
                        }
                    }

                    if (matched) continue;

                    throw new Error("계산식이 아님");
                }

                return tokens;
            }

            let tokens = 토큰만들기();
            let pos = 0;

            if (tokens.length === 0) {
                throw new Error("계산식이 아님");
            }

            function peek() {
                return tokens[pos];
            }

            function next() {
                return tokens[pos++];
            }

            function parseNumber() {
                let token = next();

                if (!token) {
                    throw new Error("숫자 오류");
                }

                if (token.type === "paren" && token.value === "(") {
                    let value = parseExpression();

                    let close = next();
                    if (!close || close.type !== "paren" || close.value !== ")") {
                        throw new Error("괄호 오류");
                    }

                    return value;
                }

                if (token.type === "number") {
                    return token.value;
                }

                throw new Error("숫자 오류");
            }

            function parseMultiply() {
                let value = parseNumber();

                while (peek() && peek().type === "op" && (peek().value === "곱하기" || peek().value === "나누기")) {
                    let op = next().value;
                    let right = parseNumber();

                    if (op === "곱하기") {
                        value *= right;
                    }

                    if (op === "나누기") {
                        value /= right;
                    }
                }

                return value;
            }

            function parseExpression() {
                let value = parseMultiply();

                while (peek() && peek().type === "op" && (peek().value === "더하기" || peek().value === "빼기")) {
                    let op = next().value;
                    let right = parseMultiply();

                    if (op === "더하기") {
                        value += right;
                    }

                    if (op === "빼기") {
                        value -= right;
                    }
                }

                return value;
            }

            let result = parseExpression();

            if (pos < tokens.length) {
                throw new Error("잘못된 식");
            }

            return result;
        }

            // 이미 저장된 변수 이름이면 그 변수 값을 꺼냅니다.
            if (value in 변수들) {
                return 변수들[value];
            }

            // 17 같은 숫자 문자열이면 숫자로 바꿉니다.
            if (value !== "" && !isNaN(Number(value))) {
                return Number(value);
            }

            // 일더하기이, 구십오 같은 범호어 계산식이면 계산 결과로 바꿉니다.
            try {
                return calc(value);
            } catch (error) {
                // 계산식도 아니고 숫자도 아니면 그냥 문자로 취급합니다.
                return value;
            }
        }

        function 조건비교하기(left, op, right) {
            let 왼쪽값 = 값해석하기(left);
            let 오른쪽값 = 값해석하기(right);
            if (op === "박범호못생김" || op === "박범호 못생김") return false;
            if (op === "박범호잘생김" || op === "박범호 잘생김") return true;
            if (op === "==") return 왼쪽값 == 오른쪽값;
            if (op === "!=") return 왼쪽값 != 오른쪽값;
            if (op === ">=") return Number(왼쪽값) >= Number(오른쪽값);
            if (op === "<=") return Number(왼쪽값) <= Number(오른쪽값);
            if (op === ">") return Number(왼쪽값) > Number(오른쪽값);
            if (op === "<") return Number(왼쪽값) < Number(오른쪽값);

            return false;
        }

        function if문실행하기(command) {
            // 사용 예시: 만약 나이 == 17 이면 범호
            // 사용 예시: 만약 점수 >= 구십 이면 합격
            // "이면"과 "라면" 둘 다 사용할 수 있게 처리합니다.
            let 기준단어 = "";

            if (command.includes("이면")) {
                기준단어 = "이면";
            } else if (command.includes("라면")) {
                기준단어 = "라면";
            } else {
                printOutput("if문 형식 오류: 만약 조건 이면 명령어");
                return true;
            }

            let 나눈것 = command.split(기준단어);

            if (나눈것.length < 2) {
                printOutput("if문 형식 오류: 만약 조건 이면 명령어");
                return true;
            }

            let 조건부분 = 나눈것[0].replace("만약", "").trim();
            let 실행부분 = 나눈것.slice(1).join(기준단어).trim();

            let 연산자목록 = [">=", "<=", "==", "!=", ">", "<","박범호잘생김","박범호못생김","박범호 잘생김","박범호 못생김"];
            let 찾은연산자 = null;

            for (let i = 0; i < 연산자목록.length; i++) {
                if (조건부분.includes(연산자목록[i])) {
                    찾은연산자 = 연산자목록[i];
                    break;
                }
            }

            if (찾은연산자 === null) {
                printOutput("if문 조건에는 ==, !=, >, <, >=, <= 중 하나가 필요합니다.");
                return true;
            }

            let 비교대상 = 조건부분.split(찾은연산자);

            if (비교대상.length !== 2) {
                printOutput("if문 조건 형식 오류입니다.");
                return true;
            }

            let 왼쪽 = 비교대상[0].trim();
            let 오른쪽 = 비교대상[1].trim();

            if (조건비교하기(왼쪽, 찾은연산자, 오른쪽)) {
                printOutput("조건 결과: 참");
                executeCommand(실행부분, true);
            } else {
                printOutput("조건 결과: 거짓");
            }

            return true;
        }


        function 변수연산후저장하기(command) {
            // 사용 예시: 범호빼기일
            // 뜻: 범호 변수의 현재 값에서 1을 뺀 뒤, 결과를 다시 범호에 저장합니다.
            let cleanCommand = command.replace(/\s/g, "");
            let 연산자목록 = ["더하기", "빼기", "곱하기", "나누기"];

            // 변수 이름이 겹칠 수 있으므로 긴 변수 이름부터 먼저 확인합니다.
            // 예: "범호"와 "범호점수"가 둘 다 있으면 "범호점수"를 먼저 잡아야 합니다.
            let 변수이름목록 = Object.keys(변수들).sort(function(a, b) {
                return b.length - a.length;
            });

            for (let i = 0; i < 변수이름목록.length; i++) {
                let name = 변수이름목록[i];

                if (name === "") continue;

                if (cleanCommand.startsWith(name)) {
                    let 남은부분 = cleanCommand.slice(name.length);
                    let 연산자로시작함 = false;

                    for (let j = 0; j < 연산자목록.length; j++) {
                        if (남은부분.startsWith(연산자목록[j])) {
                            연산자로시작함 = true;
                            break;
                        }
                    }

                    // 변수 이름만 입력한 경우는 여기서 저장하지 않습니다.
                    // 예: "범호"는 단순 출력, "범호빼기일"은 계산 후 저장입니다.
                    if (연산자로시작함 === false) {
                        return false;
                    }

                    try {
                        let result = calc(cleanCommand);
                        변수들[name] = result;
                        printOutput("계산 및 저장 결과: " + name + " = " + result);
                    } catch (error) {
                        printOutput("변수 계산 오류: " + error.message);
                    }

                    return true;
                }
            }

            return false;
        }

        function createLine() {
            const line = document.createElement("div");
            line.className = "line";

            const prompt = document.createElement("span");
            prompt.className = "prompt";
            prompt.innerText = "범호어>>>";

            const input = document.createElement("input");
            input.className = "commandInput";

            line.appendChild(prompt);
            line.appendChild(input);

            consoleBox.appendChild(line);

            input.focus();

            input.addEventListener("keyup", function(event) {
                if (event.key === "Enter") {
                    if (enterLock === true) {
                        return;
                    }

                    enterLock = true;

                    const command = input.value.trim();
                    input.disabled = true;

                    let shouldCreateLine = executeCommand(command);

                    if (command === "김현우" && isDark === true) {
                        input.classList.add("bigText");
                    }
                    else if (command === "김현우" && isDark === false) {
                        input.classList.add("disappear");

                        setTimeout(function() {
                            input.value = "";
                        }, 600);
                    }

                    if (shouldCreateLine) {
                        createLine();
                    }

                    setTimeout(function() {
                        enterLock = false;
                    }, 300);
                }
            });
        }

        function createMultiLine() {

            const textarea = document.createElement("textarea");
            textarea.className = "multiTextarea";
            textarea.placeholder = "여기에 여러 줄을 입력하세요.\n예:\n&\n나이\n17\n만약 나이 == 17 이면 범호\n일더하기이\n정세윤";

            const runButton = document.createElement("button");
            runButton.className = "runButton";
            runButton.innerText = "실행";

            line.appendChild(prompt);
            line.appendChild(textarea);
            line.appendChild(runButton);

            consoleBox.appendChild(line);
            textarea.focus();

            runButton.onclick = function() {
                textarea.disabled = true;
                runButton.disabled = true;

                let commands = textarea.value.split("\n");

                for (let i = 0; i < commands.length; i++) {
                    let command = commands[i].trim();

                    if (command !== "") {
                        printOutput("명령: " + command);
                        executeCommand(command,true);
                    }
                }

                createLine();
            };
        }
